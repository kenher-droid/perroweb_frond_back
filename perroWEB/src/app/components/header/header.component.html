<header class="site-header">
  <div class="header-top">
    <p class="promo-text">Envío gratis a partir de $50 | Atención al cliente 24/7</p>
  </div>

  <nav class="header-nav">
    <div class="logo">
      <span class="logo-icon">🐾</span>
      <span class="logo-text">PetShop</span>
    </div>

    <div class="nav-menu">
      <a href="#inicio">Inicio</a>
      <a href="#categorias">Categorías</a>
      <a href="#ofertas">Ofertas</a>
      <a href="#contacto">Contacto</a>
    </div>

    <div class="search-bar">
      <input type="text" placeholder="Buscar productos..." class="search-input" [(ngModel)]="searchQuery">
      <button class="search-btn">🔍</button>
    </div>

    <div class="header-icons">
      <button class="icon-btn" title="Carrito">🛒</button>
      <button class="icon-btn" title="Usuario">👤</button>
    </div>
  </nav>
</header>
